name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FMIX_HOME: ${{ github.workspace }}/fmix
      FMCP_HOME: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: VitaSound/fmix
          ref: 0.7.2
          path: fmix

      - name: Cache GForth 0.7.9
        id: cache-gforth
        uses: actions/cache@v4
        with:
          path: ~/opt/gforth-0.7.9
          key: gforth-0.7.9-${{ runner.os }}-v2

      - name: Build and install GForth 0.7.9
        run: bash .github/scripts/build-gforth-0.7.9.sh

      - name: Verify GForth version
        run: gforth --version 2>&1 | grep -F '0.7.9'

      - name: fmix packages.get
        run: |
          export PATH="${{ github.workspace }}/fmix/bin:${PATH}"
          fmix packages.get

      - name: fmcp test
        run: |
          export PATH="${{ github.workspace }}/fmix/bin:${PATH}"
          bin/fmcp test
